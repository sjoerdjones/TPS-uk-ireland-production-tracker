<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AeroFlow – Wind Tunnel Challenge</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#060610}
  canvas{display:block;cursor:crosshair}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const COLS=18, ROWS=11, CELL=38;
const PAL_W=112;
const MAX_TIME=32, MAX_WIND=30;
const PARTICLE_N=650;
const DEFLECT_R=34, DEFLECT_F=0.48;
const TAU=Math.PI*2;

// ═══════════════════════════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════════════════════════
const cv=document.getElementById('c'), cx=cv.getContext('2d');
let W,H,dpr,gx0,gy0;
function resize(){
  dpr=devicePixelRatio||1; W=innerWidth; H=innerHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
  gx0=PAL_W+(W-PAL_W-COLS*CELL)/2;
  gy0=(H-ROWS*CELL)/2;
}
addEventListener('resize',resize); resize();

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
function hcol(h,s,l,a){return `hsla(${h},${s}%,${l}%,${a})`}

// ═══════════════════════════════════════════════════════════════
//  PIECE TYPES
// ═══════════════════════════════════════════════════════════════
const T={
  block:{name:'Block', hp:130, drag:1.0, col:'#4488bb',stk:'#66aadd',
         desc:'Sturdy all-rounder'},
  wedge:{name:'Wedge', hp:85, drag:[0.28,0.65,1.35,0.65],
         col:'#33aa88',stk:'#55ccaa',desc:'Aero — R to rotate'},
  wheel:{name:'Wheel', hp:100, drag:0.45, col:'#cc9933',stk:'#eebb55',
         desc:'Round, low drag'},
  heavy:{name:'Heavy', hp:260, drag:1.25, col:'#8866bb',stk:'#aa88dd',
         desc:'Very tough, high drag'}
};
const TKEYS=['block','wedge','wheel','heavy'];
function gdrag(type,rot){const d=T[type].drag;return Array.isArray(d)?d[rot%4]:d;}

// ═══════════════════════════════════════════════════════════════
//  GRID
// ═══════════════════════════════════════════════════════════════
let grid=[], totalBuilt=0;
function initGrid(){
  grid=[]; for(let r=0;r<ROWS;r++) grid[r]=Array(COLS).fill(null);
  totalBuilt=0;
}
initGrid();

function place(type,c,r,rot){
  if(r<0||r>=ROWS||c<0||c>=COLS||grid[r][c]) return false;
  grid[r][c]={type,c,r,rot:rot||0,hp:T[type].hp,maxHp:T[type].hp,flash:0};
  totalBuilt++; return true;
}
function removeAt(c,r){
  if(!grid[r]||!grid[r][c]) return;
  grid[r][c]=null; totalBuilt--;
}
function cellXY(c,r){return{x:gx0+c*CELL+CELL/2,y:gy0+r*CELL+CELL/2}}
function toGrid(mx,my){return{c:Math.floor((mx-gx0)/CELL),r:Math.floor((my-gy0)/CELL)}}
function inGrid(c,r){return c>=0&&c<COLS&&r>=0&&r<ROWS}
function ncount(c,r){
  let n=0;
  if(r>0&&grid[r-1][c])n++; if(r<ROWS-1&&grid[r+1][c])n++;
  if(c>0&&grid[r][c-1])n++; if(c<COLS-1&&grid[r][c+1])n++;
  return n;
}
function activePcs(){
  const a=[]; for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(grid[r][c]) a.push(grid[r][c]);
  return a;
}

// BFS from ground row
function connMap(){
  const vis=[]; for(let r=0;r<ROWS;r++) vis[r]=Array(COLS).fill(false);
  const q=[];
  for(let c=0;c<COLS;c++) if(grid[ROWS-1][c]){vis[ROWS-1][c]=true;q.push(ROWS-1,c);}
  const D=[[-1,0],[1,0],[0,-1],[0,1]];
  for(let i=0;i<q.length;i+=2){
    const r=q[i],c=q[i+1];
    for(const[dr,dc] of D){const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!vis[nr][nc]&&grid[nr][nc]){vis[nr][nc]=true;q.push(nr,nc);}}
  }
  return vis;
}

// ═══════════════════════════════════════════════════════════════
//  SDF  (particle deflection)
// ═══════════════════════════════════════════════════════════════
function pSDF(pc,px,py){
  const o=cellXY(pc.c,pc.r), hs=CELL/2-2;
  const lx=px-o.x, ly=py-o.y;
  if(pc.type==='wheel') return cSDF(lx,ly,hs);
  if(pc.type==='wedge') return wSDF(lx,ly,hs,pc.rot);
  return rSDF(lx,ly,hs,hs);
}
function rSDF(lx,ly,hw,hh){
  const ox=Math.abs(lx)-hw, oy=Math.abs(ly)-hh;
  const d=Math.hypot(Math.max(ox,0),Math.max(oy,0))+Math.min(Math.max(ox,oy),0);
  let nx,ny;
  if(ox>oy){nx=lx>0?1:-1;ny=0}else{nx=0;ny=ly>0?1:-1}
  return{d,nx,ny};
}
function cSDF(lx,ly,r){
  const l=Math.hypot(lx,ly)||1;
  return{d:l-r,nx:lx/l,ny:ly/l};
}
function wSDF(lx,ly,hs,rot){
  let v;
  switch(rot%4){
    case 0:v=[[-hs,0],[hs,-hs],[hs,hs]];break;
    case 1:v=[[0,-hs],[hs,hs],[-hs,hs]];break;
    case 2:v=[[hs,0],[-hs,hs],[-hs,-hs]];break;
    case 3:v=[[0,hs],[-hs,-hs],[hs,-hs]];break;
  }
  return tSDF(lx,ly,v);
}
function tSDF(px,py,v){
  let md=1e9,bnx=0,bny=1,ins=true;
  for(let i=0;i<3;i++){
    const ax=v[i][0],ay=v[i][1],bx=v[(i+1)%3][0],by=v[(i+1)%3][1];
    const ex=bx-ax,ey=by-ay,el2=ex*ex+ey*ey,el=Math.sqrt(el2);
    const vx=px-ax,vy=py-ay;
    const t=clamp((vx*ex+vy*ey)/el2,0,1);
    const cx2=vx-ex*t,cy2=vy-ey*t,d2=cx2*cx2+cy2*cy2;
    const nx=ey/el,ny=-ex/el;
    if(d2<md){md=d2;bnx=nx;bny=ny;}
    if(ex*vy-ey*vx<0)ins=false;
  }
  const d=Math.sqrt(md);
  return{d:ins?-d:d,nx:bnx,ny:bny};
}

// ═══════════════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════════════
let particles=[];
class Particle{
  constructor(){this.reset(true)}
  reset(s){
    this.x=s?PAL_W+Math.random()*(W-PAL_W):PAL_W-20-Math.random()*30;
    this.y=Math.random()*H;
    this.vx=Math.max(wind*0.65,0.8)+Math.random()*0.4;
    this.vy=(Math.random()-0.5)*0.4;
    this.sz=0.8+Math.random()*1.1;
    this.al=0.18+Math.random()*0.38;
  }
  update(obs){
    this.vx+=(Math.max(wind*0.65,0.8)-this.vx)*0.018;
    this.vy*=0.992;
    if(testing) this.vy+=(Math.random()-0.5)*wind*0.006;
    for(const o of obs){
      const s=pSDF(o,this.x,this.y);
      if(s.d>DEFLECT_R) continue;
      if(s.d<1){this.vx+=s.nx*2.8;this.vy+=s.ny*2.8;}
      else{
        const t=1-s.d/DEFLECT_R, f=t*t*DEFLECT_F;
        const dot=this.vx*(-s.ny)+this.vy*s.nx, ts=dot>=0?1:-1;
        this.vx+=s.nx*f*0.52+(-s.ny)*ts*f*0.32;
        this.vy+=s.ny*f*0.52+s.nx*ts*f*0.32;
      }
    }
    this.x+=this.vx; this.y+=this.vy;
    if(this.x>W+30||this.y<-30||this.y>H+30||this.x<-50) this.reset(false);
  }
  draw(){
    const sp=Math.hypot(this.vx,this.vy), t=clamp(sp/18,0,1);
    cx.strokeStyle=hcol(Math.round(lerp(210,180,t)),Math.round(85-t*30),Math.round(48+t*42),this.al);
    cx.lineWidth=this.sz;
    cx.beginPath();cx.moveTo(this.x,this.y);
    cx.lineTo(this.x-this.vx*2.2,this.y-this.vy*2.2);cx.stroke();
  }
}

// ═══════════════════════════════════════════════════════════════
//  DEBRIS
// ═══════════════════════════════════════════════════════════════
let debris=[];
function spawnDebris(pc){
  const o=cellXY(pc.c,pc.r);
  debris.push({type:pc.type,rot:pc.rot,x:o.x,y:o.y,
    vx:1.5+wind*0.12+Math.random()*2,vy:(Math.random()-0.5)*5,
    av:(Math.random()-0.5)*0.35,a:0,life:1});
  for(let i=0;i<6;i++)
    debris.push({type:'spark',x:o.x,y:o.y,
      vx:(Math.random()-0.5)*4+wind*0.08,vy:(Math.random()-0.5)*4,
      av:0,a:0,life:0.5+Math.random()*0.3});
}

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let screen='title';
let selType=null, selRot=0;
let mouse={x:0,y:0};
let wind=0, testTime=0, testing=false;
let survived=0, piecesLeft=0, startCount=0;
let fade=0, fadeTo=null;
let bestTime=0;

// ═══════════════════════════════════════════════════════════════
//  TEST SIMULATION
// ═══════════════════════════════════════════════════════════════
function startTest(){
  const ap=activePcs();
  if(!ap.length) return;
  screen='test'; testing=true;
  testTime=0; wind=0; debris=[];
  startCount=ap.length;
  particles.forEach(p=>p.reset(true));
}

function updateTest(){
  testTime+=1/60;
  const t=clamp(testTime/MAX_TIME,0,1);
  wind=t*t*MAX_WIND;

  const ap=activePcs();
  piecesLeft=ap.length;

  for(const p of ap){
    let exp=1;
    for(let x=p.c-1;x>=0;x--){if(grid[p.r][x])exp*=0.28; else break;}
    if(p.c>0){
      if(p.r>0&&grid[p.r-1][p.c-1]) exp*=0.75;
      if(p.r<ROWS-1&&grid[p.r+1][p.c-1]) exp*=0.75;
    }
    const d=gdrag(p.type,p.rot);
    const force=d*exp*wind*wind*0.00075;
    const hMul=1+0.1*(ROWS-1-p.r);
    const nMul=1/(1+ncount(p.c,p.r)*0.28);
    const stress=force*hMul*nMul;
    p.hp-=stress;
    if(stress>0.4) p.flash=Math.min(p.flash+0.15,1);
    else p.flash*=0.92;
    if(p.hp<=0) breakPc(p);
  }

  const vis=connMap();
  for(const p of activePcs()){
    if(!vis[p.r][p.c]) breakPc(p);
  }

  for(const d of debris){
    d.x+=d.vx;d.y+=d.vy;
    d.vy+=0.18;d.vx+=wind*0.003;
    d.a+=d.av;d.life-=(d.type==='spark'?0.035:0.014);
  }
  debris=debris.filter(d=>d.life>0);

  const obs=activePcs();
  for(const p of particles) p.update(obs);

  if(activePcs().length===0||testTime>=MAX_TIME){
    survived=testTime;
    piecesLeft=activePcs().length;
    testing=false;
    if(survived>bestTime) bestTime=survived;
    trans('result');
  }
}

function breakPc(p){
  if(!grid[p.r][p.c]) return;
  spawnDebris(p);
  grid[p.r][p.c]=null;
}

// ═══════════════════════════════════════════════════════════════
//  TRANSITIONS
// ═══════════════════════════════════════════════════════════════
function trans(to){fadeTo=to;fade=0;}
function updateFade(){if(!fadeTo)return;fade+=0.05;if(fade>=1){screen=fadeTo;fadeTo=null;fade=1;}}

// ═══════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════
cv.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
cv.addEventListener('mousedown',e=>{
  e.preventDefault();
  if(fadeTo) return;
  if(screen==='title') return clickTitle();
  if(screen==='build') return clickBuild(e);
  if(screen==='result') return clickResult();
});
cv.addEventListener('contextmenu',e=>e.preventDefault());
addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R') selRot=(selRot+1)%4;
  if(e.key==='Escape') selType=null;
  if(e.key===' '&&screen==='build'){e.preventDefault();startTest();}
});

function clickTitle(){trans('build');}

function clickBuild(e){
  const mx=mouse.x, my=mouse.y;
  // Palette
  if(mx<PAL_W){
    let py=68;
    for(const k of TKEYS){
      if(my>=py&&my<py+50){selType=(selType===k?null:k);selRot=0;return;}
      py+=56;
    }
    if(my>=H-65&&my<H-29){startTest();return;}
    if(my>=H-108&&my<H-72){initGrid();return;}
    return;
  }
  const g=toGrid(mx,my);
  if(!inGrid(g.c,g.r)) return;
  if(e.button===2){removeAt(g.c,g.r);return;}
  if(selType&&!grid[g.r][g.c]) place(selType,g.c,g.r,selRot);
  else if(grid[g.r][g.c]&&!selType) removeAt(g.c,g.r);
}

function clickResult(){
  const mx=mouse.x,my=mouse.y;
  const bw=170,bh=44,bx=W/2-bw/2,by=H/2+80;
  if(mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh){
    testing=false;wind=0;screen='build';
    for(const p of activePcs()){p.hp=p.maxHp;p.flash=0;}
    return;
  }
  const bx2=W/2-70,by2=H/2+136;
  if(mx>=bx2&&mx<=bx2+140&&my>=by2&&my<=by2+36){
    initGrid();testing=false;wind=0;screen='build';
  }
}

// ═══════════════════════════════════════════════════════════════
//  DRAWING HELPERS
// ═══════════════════════════════════════════════════════════════
function wedgeV(hs,rot){
  switch(rot%4){
    case 0:return[[-hs,0],[hs,-hs],[hs,hs]];
    case 1:return[[0,-hs],[hs,hs],[-hs,hs]];
    case 2:return[[hs,0],[-hs,hs],[-hs,-hs]];
    case 3:return[[0,hs],[-hs,-hs],[hs,-hs]];
  }
}
function drawShape(type,x,y,sz,rot,fill,stk,lw){
  cx.save();cx.translate(x,y);
  cx.fillStyle=fill;cx.strokeStyle=stk;cx.lineWidth=lw||1.5;
  const hs=sz;
  switch(type){
    case 'block':case'heavy':
      cx.beginPath();cx.roundRect(-hs,-hs,hs*2,hs*2,3);cx.fill();cx.stroke();
      if(type==='heavy'){cx.strokeStyle='rgba(255,255,255,0.13)';cx.lineWidth=1;
        cx.beginPath();cx.roundRect(-hs+3,-hs+3,hs*2-6,hs*2-6,2);cx.stroke();}
      break;
    case 'wedge':
      const v=wedgeV(hs,rot||0);
      cx.beginPath();cx.moveTo(v[0][0],v[0][1]);cx.lineTo(v[1][0],v[1][1]);
      cx.lineTo(v[2][0],v[2][1]);cx.closePath();cx.fill();cx.stroke();
      break;
    case 'wheel':
      cx.beginPath();cx.arc(0,0,hs,0,TAU);cx.fill();cx.stroke();
      cx.fillStyle='rgba(0,0,0,0.25)';cx.beginPath();cx.arc(0,0,hs*0.28,0,TAU);cx.fill();
      cx.strokeStyle='rgba(0,0,0,0.18)';cx.lineWidth=1;
      for(let a=0;a<4;a++){const an=a*Math.PI/2;
        cx.beginPath();cx.moveTo(0,0);cx.lineTo(Math.cos(an)*hs*0.85,Math.sin(an)*hs*0.85);cx.stroke();}
      break;
  }
  cx.restore();
}

function drawPiece(p){
  const o=cellXY(p.c,p.r), hs=CELL/2-2, pr=T[p.type];
  let fill=pr.col, stk=pr.stk;
  if(testing){
    const hp=clamp(p.hp/p.maxHp,0,1);
    const r0=parseInt(pr.col.slice(1,3),16),g0=parseInt(pr.col.slice(3,5),16),b0=parseInt(pr.col.slice(5,7),16);
    let rr=lerp(r0,255,1-hp),gg=lerp(g0,60,(1-hp)*0.8),bb=lerp(b0,30,1-hp);
    if(p.flash>0.1){rr=Math.min(255,rr+70*p.flash);gg=Math.min(255,gg+40*p.flash);bb=Math.min(255,bb+40*p.flash);}
    fill=`rgb(${rr|0},${gg|0},${bb|0})`;
  }
  drawShape(p.type,o.x,o.y,hs,p.rot,fill,stk,1.5);
  if(testing){
    const hp=clamp(p.hp/p.maxHp,0,1);
    if(hp<0.98){
      const bw=CELL*0.65,bh=3,bx=o.x-bw/2,by=o.y+hs+4;
      cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(bx,by,bw,bh);
      cx.fillStyle=hp>0.5?'#44ee88':hp>0.2?'#eeaa22':'#ff3322';
      cx.fillRect(bx,by,bw*hp,bh);
    }
  }
}

function drawDebrisItem(d){
  if(d.type==='spark'){
    cx.globalAlpha=d.life;cx.fillStyle='#ffaa44';
    cx.beginPath();cx.arc(d.x,d.y,2+d.life*2,0,TAU);cx.fill();
    cx.globalAlpha=1;return;
  }
  cx.save();cx.globalAlpha=d.life*0.7;cx.translate(d.x,d.y);cx.rotate(d.a);
  const pr=T[d.type];
  drawShape(d.type,0,0,CELL*0.35,d.rot,pr.col,pr.stk,1);
  cx.restore();cx.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════════
//  DRAW BACKGROUND / GRID
// ═══════════════════════════════════════════════════════════════
function drawBG(){
  const bg=cx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#060610');bg.addColorStop(1,'#0a0e1e');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);
}
function drawGrid(){
  cx.strokeStyle='rgba(30,50,80,0.18)';cx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++){const x=gx0+c*CELL;cx.beginPath();cx.moveTo(x,gy0);cx.lineTo(x,gy0+ROWS*CELL);cx.stroke();}
  for(let r=0;r<=ROWS;r++){const y=gy0+r*CELL;cx.beginPath();cx.moveTo(gx0,y);cx.lineTo(gx0+COLS*CELL,y);cx.stroke();}
  const gy=gy0+ROWS*CELL;
  cx.strokeStyle='#556688';cx.lineWidth=2.5;
  cx.beginPath();cx.moveTo(gx0-10,gy);cx.lineTo(gx0+COLS*CELL+10,gy);cx.stroke();
  cx.fillStyle='#445566';
  for(let c=0;c<COLS;c++){cx.beginPath();cx.arc(gx0+c*CELL+CELL/2,gy+6,2.5,0,TAU);cx.fill();}
  cx.fillStyle='#334455';cx.font='9px monospace';cx.textAlign='center';
  cx.fillText('\u25BC ANCHORED TO GROUND \u25BC',gx0+COLS*CELL/2,gy+18);
}
function drawWindArrows(al){
  cx.strokeStyle=`rgba(30,60,100,${al})`;cx.lineWidth=1;
  for(let y=gy0+20;y<gy0+ROWS*CELL;y+=50)
    for(let x=gx0+20;x<gx0+COLS*CELL;x+=70){
      cx.beginPath();cx.moveTo(x,y);cx.lineTo(x+14,y);
      cx.lineTo(x+10,y-3);cx.moveTo(x+14,y);cx.lineTo(x+10,y+3);cx.stroke();
    }
}

// ═══════════════════════════════════════════════════════════════
//  PALETTE
// ═══════════════════════════════════════════════════════════════
function drawPalette(){
  cx.fillStyle='rgba(6,10,20,0.94)';cx.fillRect(0,0,PAL_W,H);
  cx.strokeStyle='#1a2a44';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(PAL_W,0);cx.lineTo(PAL_W,H);cx.stroke();

  cx.textAlign='center';cx.fillStyle='#88bbdd';cx.font='bold 12px monospace';
  cx.fillText('PARTS',PAL_W/2,22);
  cx.fillStyle='#445566';cx.font='9px monospace';
  cx.fillText('R: rotate wedge',PAL_W/2,40);
  cx.fillText('Space: test',PAL_W/2,52);

  let py=68;
  for(const k of TKEYS){
    const pr=T[k], hov=mouse.x<PAL_W&&mouse.y>=py&&mouse.y<py+50, sel=selType===k;
    cx.fillStyle=sel?'rgba(0,150,255,0.18)':hov?'rgba(0,120,255,0.1)':'rgba(12,20,38,0.6)';
    cx.strokeStyle=sel?'#44aaff':'#1a2a44';cx.lineWidth=sel?1.5:1;
    cx.beginPath();cx.roundRect(8,py,PAL_W-16,48,5);cx.fill();cx.stroke();
    drawShape(k,30,py+24,12,k==='wedge'?selRot:0,pr.col,pr.stk,1);
    cx.fillStyle=sel?'#aaddff':'#7799bb';cx.font='bold 10px monospace';cx.textAlign='left';
    cx.fillText(pr.name,50,py+20);
    cx.fillStyle='#445566';cx.font='9px monospace';
    cx.fillText(pr.desc,50,py+34);
    cx.textAlign='center';
    py+=56;
  }

  const ap=activePcs().length;
  const tby=H-65;
  const tH=mouse.x<PAL_W&&mouse.y>=tby&&mouse.y<tby+36;
  cx.fillStyle=ap?(tH?'rgba(0,200,100,0.25)':'rgba(0,160,80,0.15)'):'rgba(30,40,50,0.3)';
  cx.strokeStyle=ap?'#33bb77':'#333';cx.lineWidth=1.5;
  cx.beginPath();cx.roundRect(8,tby,PAL_W-16,36,5);cx.fill();cx.stroke();
  cx.fillStyle=ap?'#55eeaa':'#444';cx.font='bold 12px monospace';cx.textAlign='center';
  cx.fillText('\u25B6 TEST',PAL_W/2,tby+22);

  const cby=H-108;
  const cH=mouse.x<PAL_W&&mouse.y>=cby&&mouse.y<cby+36;
  cx.fillStyle=cH?'rgba(255,80,50,0.15)':'rgba(25,30,45,0.5)';
  cx.strokeStyle='#553322';cx.lineWidth=1;
  cx.beginPath();cx.roundRect(8,cby,PAL_W-16,36,5);cx.fill();cx.stroke();
  cx.fillStyle='#cc7755';cx.font='11px monospace';
  cx.fillText('Clear All',PAL_W/2,cby+22);

  cx.fillStyle='#445566';cx.font='10px monospace';
  cx.fillText(ap+' piece'+(ap!==1?'s':''),PAL_W/2,H-10);
}

// ═══════════════════════════════════════════════════════════════
//  GHOST
// ═══════════════════════════════════════════════════════════════
function drawGhost(){
  if(!selType||mouse.x<PAL_W) return;
  const g=toGrid(mouse.x,mouse.y);
  if(!inGrid(g.c,g.r)) return;
  const o=cellXY(g.c,g.r), ok=!grid[g.r][g.c];
  cx.globalAlpha=ok?0.45:0.15;
  drawShape(selType,o.x,o.y,CELL/2-2,selRot,ok?T[selType].col:'#663333',ok?T[selType].stk:'#883333',2);
  cx.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════════
//  WIND GAUGE
// ═══════════════════════════════════════════════════════════════
function drawGauge(){
  const gw=28,gh=180,gx=W-50,gy=H/2-gh/2;
  cx.fillStyle='rgba(10,15,30,0.8)';cx.strokeStyle='#223344';cx.lineWidth=1;
  cx.beginPath();cx.roundRect(gx-4,gy-20,gw+8,gh+44,6);cx.fill();cx.stroke();
  cx.fillStyle='#667788';cx.font='bold 9px monospace';cx.textAlign='center';
  cx.fillText('WIND',gx+gw/2,gy-6);
  cx.fillStyle='#0a1020';cx.fillRect(gx,gy,gw,gh);
  const frac=clamp(wind/MAX_WIND,0,1), fh=gh*frac;
  const gr=cx.createLinearGradient(0,gy+gh,0,gy);
  gr.addColorStop(0,'#22aa55');gr.addColorStop(0.4,'#aaaa22');gr.addColorStop(0.7,'#ee6622');gr.addColorStop(1,'#ff2222');
  cx.fillStyle=gr;cx.fillRect(gx,gy+gh-fh,gw,fh);
  cx.strokeStyle='#334455';cx.lineWidth=1;cx.strokeRect(gx,gy,gw,gh);
  cx.fillStyle='#aabbcc';cx.font='bold 10px monospace';
  cx.fillText(wind.toFixed(1),gx+gw/2,gy+gh+16);
  cx.fillStyle='#556677';cx.font='8px monospace';
  cx.fillText('m/s',gx+gw/2,gy+gh+27);
}

function drawTestHUD(){
  cx.textAlign='center';
  cx.fillStyle='#ddeeff';cx.font='bold 22px monospace';
  cx.fillText(testTime.toFixed(1)+'s',W/2,36);
  cx.fillStyle='#7799aa';cx.font='13px monospace';
  cx.fillText('Pieces: '+activePcs().length+'/'+startCount,W/2,58);
}

// ═══════════════════════════════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════════════════════════════
function drawTitle(){
  if(!particles.length) for(let i=0;i<PARTICLE_N;i++) particles.push(new Particle());
  for(const p of particles){p.update([]);p.draw();}
  cx.fillStyle='rgba(6,6,15,0.55)';cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  cx.fillStyle='#d0eeff';cx.font='bold 50px monospace';
  cx.fillText('AEROFLOW',W/2,H/2-55);
  cx.fillStyle='#5599bb';cx.font='15px monospace';
  cx.fillText('Wind Tunnel Challenge',W/2,H/2-22);
  cx.fillStyle='#778899';cx.font='13px monospace';
  cx.fillText('Build a structure. Survive the wind.',W/2,H/2+14);
  const bw=160,bh=48,bx=W/2-bw/2,by=H/2+45;
  const hov=mouse.x>=bx&&mouse.x<=bx+bw&&mouse.y>=by&&mouse.y<=by+bh;
  cx.fillStyle=hov?'rgba(0,170,255,0.25)':'rgba(20,40,70,0.7)';
  cx.strokeStyle=hov?'#44bbff':'#335577';cx.lineWidth=1.5;
  cx.beginPath();cx.roundRect(bx,by,bw,bh,6);cx.fill();cx.stroke();
  cx.fillStyle='#cce8ff';cx.font='bold 15px monospace';
  cx.fillText('BUILD',W/2,by+30);
  if(bestTime>0){cx.fillStyle='#445566';cx.font='11px monospace';cx.fillText('Best: '+bestTime.toFixed(1)+'s',W/2,H/2+120);}
  cx.fillStyle='#334455';cx.font='11px monospace';
  cx.fillText('Click to start',W/2,H-30);
}

function drawBuild(){
  drawGrid();
  drawWindArrows(0.12);
  for(const p of activePcs()) drawPiece(p);
  drawGhost();
  drawPalette();
  // Highlight disconnected pieces
  const vis=connMap();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(grid[r][c]&&!vis[r][c]){
      const o=cellXY(c,r);
      cx.strokeStyle='rgba(255,100,50,0.5)';cx.lineWidth=2;cx.setLineDash([4,3]);
      cx.strokeRect(o.x-CELL/2+1,o.y-CELL/2+1,CELL-2,CELL-2);
      cx.setLineDash([]);
    }
  }
}

function drawTestScene(){
  drawGrid();
  const obs=activePcs();
  for(const p of particles) p.draw();
  for(const p of obs) drawPiece(p);
  for(const d of debris) drawDebrisItem(d);
  drawGauge();
  drawTestHUD();
  drawWindArrows(0.06+wind/MAX_WIND*0.15);
}

function drawResult(){
  drawTestScene();
  cx.fillStyle='rgba(6,6,15,0.65)';cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  cx.fillStyle='#d0eeff';cx.font='bold 30px monospace';
  cx.fillText('Test Complete',W/2,H/2-70);
  cx.fillStyle='#88bbdd';cx.font='16px monospace';
  cx.fillText('Survived: '+survived.toFixed(1)+'s / '+MAX_TIME+'s',W/2,H/2-30);
  cx.fillStyle='#7799aa';cx.font='14px monospace';
  cx.fillText('Pieces remaining: '+piecesLeft+'/'+startCount,W/2,H/2);
  const stars=survived>=MAX_TIME?3:survived>=MAX_TIME*0.65?2:survived>=MAX_TIME*0.3?1:0;
  cx.font='32px monospace';cx.fillStyle='#ffcc00';
  cx.fillText('\u2605'.repeat(stars)+'\u2606'.repeat(3-stars),W/2,H/2+42);
  // Buttons
  const bw=170,bh=44,bx=W/2-bw/2,by=H/2+80;
  const h1=mouse.x>=bx&&mouse.x<=bx+bw&&mouse.y>=by&&mouse.y<=by+bh;
  cx.fillStyle=h1?'rgba(0,170,255,0.25)':'rgba(20,50,80,0.7)';
  cx.strokeStyle=h1?'#44bbff':'#335577';cx.lineWidth=1.5;
  cx.beginPath();cx.roundRect(bx,by,bw,bh,6);cx.fill();cx.stroke();
  cx.fillStyle='#cce8ff';cx.font='bold 13px monospace';
  cx.fillText('Rebuild & Retry',W/2,by+28);
  const bx2=W/2-70,by2=H/2+136;
  const h2=mouse.x>=bx2&&mouse.x<=bx2+140&&mouse.y>=by2&&mouse.y<=by2+36;
  cx.fillStyle=h2?'rgba(120,140,180,0.2)':'rgba(20,30,50,0.5)';
  cx.strokeStyle='#334466';cx.lineWidth=1;
  cx.beginPath();cx.roundRect(bx2,by2,140,36,5);cx.fill();cx.stroke();
  cx.fillStyle='#7799bb';cx.font='12px monospace';
  cx.fillText('Start Fresh',W/2,by2+22);
}

// ═══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════
function loop(){
  cx.clearRect(0,0,W,H);
  drawBG();
  if(screen==='title') drawTitle();
  if(screen==='build') drawBuild();
  if(screen==='test'){updateTest();drawTestScene();}
  if(screen==='result') drawResult();
  if(fadeTo){updateFade();cx.fillStyle=`rgba(6,6,15,${1-Math.abs(fade*2-1)})`;cx.fillRect(0,0,W,H);}
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
for(let i=0;i<PARTICLE_N;i++) particles.push(new Particle());
loop();
</script>
